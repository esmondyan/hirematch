# Development setup — single container, direct port exposure
# For production, use: docker compose -f docker-compose.prod.yml up -d

services:
  hirematch:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
    env_file:
      - .env
    restart: unless-stopped
