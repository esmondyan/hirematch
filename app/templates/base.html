<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HireMatch - 智能面试助手{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="app-header">
        <div class="header-content">
            <a href="/" class="logo">
                <span class="logo-icon">HM</span>
                <span class="logo-text">HireMatch</span>
            </a>
            <span class="header-subtitle">智能面试初筛助手</span>
        </div>
    </header>

    <main class="app-main">
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
