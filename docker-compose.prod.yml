# Production deployment with Nginx reverse proxy
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      # - "443:443"  # Uncomment for HTTPS
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/app/static:ro
      - ./uploads:/app/uploads:ro
      # - /etc/letsencrypt:/etc/letsencrypt:ro  # Uncomment for HTTPS
    depends_on:
      - hirematch
    restart: unless-stopped
    networks:
      - hirematch-net

  # FastAPI application
  hirematch:
    build: .
    expose:
      - "8000"
    volumes:
      - ./uploads:/app/uploads
      - ./hirematch.db:/app/hirematch.db
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - hirematch-net
    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  hirematch-net:
    driver: bridge
