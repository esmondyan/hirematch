<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HireMatch - 登录</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <svg class="login-logo-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" width="56" height="56">
                    <rect x="6" y="4" width="13" height="40" rx="6" fill="currentColor" opacity="0.9"/>
                    <rect x="29" y="4" width="13" height="40" rx="6" fill="currentColor" opacity="0.9"/>
                    <rect x="6" y="4" width="36" height="5" rx="2.5" fill="currentColor"/>
                    <rect x="6" y="39" width="36" height="5" rx="2.5" fill="currentColor"/>
                    <path d="M17 24 L22 29 L32 18" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <h1>HireMatch</h1>
                <p>智能面试初筛助手</p>
            </div>

            {% if error %}
            <div class="alert alert-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/login" class="login-form">
                <div class="form-group">
                    <label for="org_name">组织名称</label>
                    <input type="text" id="org_name" name="org_name" required autofocus
                           placeholder="输入公司名称，如：XX科技 或 XX科技-技术部">
                </div>
                <div class="form-group">
                    <label for="username">你的姓名</label>
                    <input type="text" id="username" name="username" required
                           placeholder="输入你的真实姓名，如：张三">
                </div>
                <button type="submit" class="btn btn-primary btn-full">进入 HireMatch</button>
                <p class="login-hint">同一组织的同事输入相同组织名称即可共享数据。所有操作均记录姓名及时间。</p>
            </form>
        </div>
    </div>
</body>
</html>
