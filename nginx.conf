# Production Nginx reverse proxy config
# Place at /etc/nginx/conf.d/hirematch.conf or include in nginx.conf

upstream hirematch_app {
    server hirematch:8000;
}

server {
    listen 80;
    server_name _;  # Replace with your domain or server IP

    client_max_body_size 10m;

    # Static files served directly by nginx
    location /static/ {
        alias /app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Voice uploads
    location /voice/ {
        alias /app/uploads/voice/;
    }

    # Proxy all other requests to FastAPI
    location / {
        proxy_pass http://hirematch_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;  # LLM calls can take time
        proxy_buffering off;
    }
}

